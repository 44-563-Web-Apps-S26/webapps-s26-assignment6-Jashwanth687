<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cruise Travel Planner</title>
</head>
<body>

<h2>Jashwanth reddy Baddam travel planner</h2>

<form>
  <input type="checkbox" id="caribbean" value="True">
  <label for="caribbean">Caribbean</label><br>

  <input type="checkbox" id="mediterranean" value="True">
  <label for="mediterranean">Mediterranean</label><br>

  <input type="checkbox" id="baltic" value="False">
  <label for="baltic">Baltic</label><br>

  <button type="button" onclick="choices()">Cruise Choices</button>
</form>

<form>
  <label for="startCityInput">Enter starting city</label>
  <input type="text" id="startCityInput" value="Athens"><br>

  <label for="endCityInput">Enter ending city</label>
  <input type="text" id="endCityInput"><br>

  <button type="button" onclick="updateTrip()">Update the trip</button>
</form>

<p id="tripResult"></p>

<script>
let my_trip = {};

function choices() {
  my_trip = {};
  my_trip.cari = document.getElementById("caribbean").checked;
  my_trip.medi = document.getElementById("mediterranean").checked;
  my_trip.balt = document.getElementById("baltic").checked;

  document.getElementById("tripResult").innerHTML = JSON.stringify(my_trip);
}

function updateTrip() {
  const startCity = document.getElementById("startCityInput").value;
  const endCity = document.getElementById("endCityInput").value;

  my_trip["startCity"] = startCity;
  my_trip["endCity"] = endCity;

  document.getElementById("tripResult").innerHTML = JSON.stringify(my_trip);
}

function updateTripl() {
  updateTrip();
}
</script>

</body>
</html>
