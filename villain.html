<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Villain Input Form</title>
</head>
<body>

<h2>Villains by Jashwanth reddy Baddam</h2>

<form>
  <label for="villain_secret">Funny Man</label>
  <input type="password" id="villain_secret" value="Joker"><br>

  <label for="villain_guess">Guess the villain</label>
  <input type="text" id="villain_guess"><br>

  <button type="button" onclick="checkVillain()">Check the guess</button>
</form>

<p id="result"></p>

<div>
  <img id="treePic" src="Maple tree.png" alt="Tree image" width="150" height="150" onclick="updatePic()">
</div>

<script>
let caught = 0;
let gotAway = 0;
let usePic = 1;

function checkVillain() {
  const secret = document.getElementById("villain_secret").value;
  const guess = document.getElementById("villain_guess").value;

  if (secret === guess) {
    caught = caught + 1;
    alert("You caught them");
  } else {
    gotAway = gotAway + 1;
    alert("Maybe next time");
  }

  document.getElementById("result").innerHTML = "caught: " + caught + " gotAway: " + gotAway;
}

function updatePic() {
  const image = document.getElementById("treePic");

  switch (usePic) {
    case 1:
      image.src = "Ash tree.png";
      usePic = 2;
      break;
    case 2:
      image.src = "Banyan tree.png";
      usePic = 3;
      break;
    case 3:
      image.src = "Maple tree.png";
      usePic = 1;
      break;
    default:
      image.src = "Ash tree.png";
      usePic = 2;
      break;
  }
}
</script>

</body>
</html>
